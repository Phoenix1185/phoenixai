<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="phoenixGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="phoenixGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1a1a1a"/>
  <circle cx="16" cy="16" r="14" fill="url(#phoenixGradient)" opacity="0.1"/>
  
  <!-- Phoenix flame body -->
  <path d="M16 4C16 4 12 9 12 14C12 19 16 22 16 22C16 22 20 19 20 14C20 9 16 4 16 4Z" 
        fill="url(#phoenixGradient)" />
  
  <!-- Inner flame highlight -->
  <path d="M16 6C16 6 13.5 10 13.5 14C13.5 17.5 16 19 16 19C16 19 18.5 17.5 18.5 14C18.5 10 16 6 16 6Z" 
        fill="url(#phoenixGlow)" opacity="0.7"/>
  
  <!-- Wings/tail feathers -->
  <path d="M16 22C16 22 11 24 8 28" stroke="url(#phoenixGradient)" stroke-width="2" stroke-linecap="round"/>
  <path d="M16 22C16 22 21 24 24 28" stroke="url(#phoenixGradient)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Outer glow -->
  <circle cx="16" cy="16" r="14.5" stroke="url(#phoenixGradient)" stroke-width="0.5" opacity="0.5"/>
</svg>
